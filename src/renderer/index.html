<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单词悬浮提示器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部拖拽栏 + 控制按钮 -->
    <div id="titlebar">
      <div id="drag-area">
        <span class="app-title">Word Floater</span>
      </div>
      <div id="controls">
        <button id="btn-open" class="ctrl-btn" title="打开Excel文件">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        </button>
        <button id="btn-pin" class="ctrl-btn" title="置顶切换">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L12 22M5 5l14 14M5 19L19 5"/></svg>
        </button>
        <button id="btn-hide" class="ctrl-btn" title="隐藏窗口 (Ctrl+Shift+W)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- 单词显示区域 -->
    <div id="word-display">
      <div id="word-text">Loading...</div>
      <div id="phonetic-text"></div>
      <div id="definition-text"></div>
    </div>

    <!-- 交互式进度条 -->
    <div id="progress-bar-container">
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
        <div id="progress-bar-thumb"></div>
      </div>
      <span id="progress-bar-label">0 / 0</span>
    </div>

    <!-- 底部控制栏 -->
    <div id="bottom-bar">
      <div id="playback-controls">
        <button id="btn-prev" class="play-btn" title="上一个">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="btn-play" class="play-btn" title="播放/暂停">
          <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="btn-next" class="play-btn" title="下一个">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div id="progress-info">
        <span id="word-index">0 / 0</span>
      </div>
      <div id="speed-control">
        <label for="speed-slider">速度</label>
        <input type="range" id="speed-slider" min="1" max="30" value="5" step="1">
        <span id="speed-value">5s</span>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
